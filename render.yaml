# Render Blueprint for Vroom HR Backend
# Deploy with: render-blueprint render.yaml

services:
  # Backend Web Service
  - type: web
    name: vroom-hr-backend
    env: python
    region: singapore
    rootDirectory: backend
    buildCommand: uv sync --frozen --no-dev
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port 8000
    # Run migrations on each deploy
    prerenderCommand: uv run alembic upgrade head
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: AUTH_DATABASE_URL
        fromDatabase:
          name: vroom-hr-db
          property: internalConnectionString
      - key: AUTH_REDIS_URL
        fromService:
          type: redis
          name: vroom-hr-redis
          property: url
      # JWT Secret - GENERATE NEW ONE FOR PRODUCTION
      - key: AUTH_JWT_SECRET_KEY
        generateValue: true
      # OAuth Token Encryption Key - GENERATE NEW ONE FOR PRODUCTION
      # Run: python -c "import base64; import os; print(base64.b64encode(os.urandom(32)).decode())"
      - key: AUTH_OAUTH_TOKEN_ENCRYPTION_KEY
        generateValue: true
      - key: AUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: AUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: AUTH_GOOGLE_REDIRECT_URI
        # Update this to your Render URL after deployment
        value: https://vroom-hr-backend.onrender.com/api/auth/callback
      - key: AUTH_WHITELIST_FILE_PATH
        value: /app/config/whitelist.txt
      - key: AUTH_FRONTEND_URL
        # Update this to your frontend Render URL
        value: https://vroom-hr-frontend.onrender.com
      - key: AUTH_SUPER_ADMIN_EMAIL
        sync: false
      - key: EMPLOYEE_MINIO_ENDPOINT
        sync: false
      - key: EMPLOYEE_MINIO_ACCESS_KEY
        sync: false
      - key: EMPLOYEE_MINIO_SECRET_KEY
        sync: false
      - key: EMPLOYEE_MINIO_BUCKET
        value: employee-documents
      - key: EMPLOYEE_MAX_FILE_SIZE_MB
        value: "10"
      - key: AUTH_RATE_LIMIT_LOGIN_MAX
        value: "5"
      - key: AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS
        value: "60"
      - key: AUTH_JWT_ALGORITHM
        value: HS256
      - key: AUTH_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: AUTH_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

databases:
  - name: vroom-hr-db
    region: singapore
    plan: free

redis:
  - name: vroom-hr-redis
    region: singapore
    plan: free
