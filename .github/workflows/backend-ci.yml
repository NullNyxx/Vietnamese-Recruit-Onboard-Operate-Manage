name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run Ruff
        working-directory: backend
        run: uv run ruff check src/

      - name: Run Ruff format check
        working-directory: backend
        run: uv run ruff format --check src/

      - name: Run MyPy
        working-directory: backend
        run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: "test-client-id"
      GOOGLE_CLIENT_SECRET: "test-client-secret"
      JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-only"
      OAUTH_TOKEN_ENCRYPTION_KEY: "dGVzdC1lbmNyeXB0aW9uLWtleS0zMi1ieXRlcw=="
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/vroom_test"
      SYNC_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/vroom_test"
      REDIS_URL: "redis://localhost:6379/0"
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run pytest
        working-directory: backend
        run: uv run pytest tests/ -v
