name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --all-extras

      - name: Run Ruff
        working-directory: backend
        run: uv run ruff check src/ --fix

      - name: Run Ruff format check
        working-directory: backend
        run: uv run ruff format src/

      - name: Run MyPy
        working-directory: backend
        run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        working-directory: backend
        run: uv sync --frozen --all-extras

      - name: Run tests
        working-directory: backend
        run: uv run pytest tests/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          AUTH_GOOGLE_CLIENT_ID: test-client-id
          AUTH_GOOGLE_CLIENT_SECRET: test-client-secret
          AUTH_JWT_SECRET_KEY: test-jwt-secret-key-32-bytes-long
          AUTH_OAUTH_TOKEN_ENCRYPTION_KEY: dGVzdC1rZXktMzItYnl0ZXMtbG9uZw==
