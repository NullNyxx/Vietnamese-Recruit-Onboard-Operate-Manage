# Alembic Configuration File

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path prepend - ensures the backend src is importable
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
revision_environment = false

# set to 'true' to allow .hierarchical_revision_ids to be used
# in the migration file
# sourceless = false

# version location specification
version_locations = %(here)s/alembic/versions

# version path separator
# version_path_separator = os

# output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Database URL - loaded from environment variable in env.py
# This is a fallback; env.py reads DATABASE_URL from environment
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/vroom_hr


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
